<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: head(${mode == 'edit' ? 'Edit Todo' : 'New Todo'})}"></head>
<body>

<header th:replace="~{fragments/layout :: header}"></header>

<main class="container">

    <h1 th:text="${mode == 'edit' ? 'Edit Todo' : 'New Todo'}">New Todo</h1>

    <form th:action="${mode == 'edit'} ? @{|/todos/${todoForm.id}|} : @{/todos}"
          th:object="${todoForm}"
          method="post"
          class="card">

        <div class="field">
            <label for="title">Title</label>
            <input type="text" id="title" th:field="*{title}" maxlength="200">
            <small class="error" th:if="${#fields.hasErrors('title')}" th:errors="*{title}"></small>
        </div>

        <div class="field">
            <label for="description">Description</label>
            <textarea id="description" th:field="*{description}" rows="4" maxlength="1000"></textarea>
            <small class="error" th:if="${#fields.hasErrors('description')}" th:errors="*{description}"></small>
        </div>

        <div class="field check-row">
            <input type="checkbox" id="completed" th:field="*{completed}">
            <label for="completed">Completed</label>
        </div>

        <div class="form-actions">
            <a class="btn btn-ghost" th:href="@{/todos}">Cancel</a>
            <button type="submit" class="btn btn-primary"
                    th:text="${mode == 'edit' ? 'Save changes' : 'Create todo'}">Save</button>
        </div>
    </form>

</main>

<footer th:replace="~{fragments/layout :: footer}"></footer>

</body>
</html>
